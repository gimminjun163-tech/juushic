<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>주식 게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d40;
  --border:#2d3650;--border2:#3d4d70;
  --text:#e8ecf4;--text2:#8e9ab8;--text3:#5a6480;
  --red:#ff4d4d;--red-dim:#3d1a1a;
  --blue:#4d9eff;--blue-dim:#1a2d3d;
  --green:#4dbb7a;--green-dim:#1a2d22;
  --accent:#7c6af5;--accent-dim:#231f4a;
  --gold:#e8b830;--gold-dim:#2e2810;
  --radius:10px;--radius-sm:6px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
[data-theme="light"]{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#f0f1f4;--bg4:#e4e6ec;
  --border:#d0d4de;--border2:#b0b6c8;
  --text:#1a1d2e;--text2:#5a6080;--text3:#9098b0;
  --red:#d63030;--red-dim:#fde8e8;
  --blue:#1a6fd4;--blue-dim:#e0eeff;
  --green:#1a8a4a;--green-dim:#e0f5ea;
  --accent:#5a49d6;--accent-dim:#ede8ff;
  --gold:#9a6f00;--gold-dim:#fdf4d0;
  --shadow:0 4px 24px rgba(0,0,0,0.1);
}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;transition:background 0.2s,color 0.2s}
.app{max-width:940px;margin:0 auto;padding:16px 14px}
.topbar{display:flex;align-items:center;gap:4px;padding:0 0 13px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-right:12px}
.nav-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:5px 10px;border-radius:var(--radius-sm);transition:all 0.15s;font-family:inherit}
.nav-btn:hover{color:var(--text2);background:var(--bg3)}
.nav-btn.active{color:var(--text);background:var(--bg4);border:1px solid var(--border2)}
.theme-btn{margin-left:auto;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;transition:all 0.15s}
.theme-btn:hover{background:var(--bg4)}
.section{display:none}.section.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;transition:background 0.2s,border-color 0.2s}
.card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-family:'DM Mono',monospace}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;transition:background 0.2s}
.metric .lbl{font-size:10px;color:var(--text3);margin-bottom:3px;font-family:'DM Mono',monospace;letter-spacing:0.5px}
.metric .val{font-size:16px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.up{color:var(--red)}.down{color:var(--blue)}.neu{color:var(--text2)}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-left:4px;font-family:'DM Mono',monospace;font-weight:500}
.tag-up{background:var(--red-dim);color:var(--red)}
.tag-down{background:var(--blue-dim);color:var(--blue)}
.tag-neu{background:var(--bg4);color:var(--text3)}
.sector-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg4);color:var(--text3);margin-left:4px;font-family:'DM Mono',monospace;vertical-align:middle}
.stock-row{display:flex;align-items:center;justify-content:space-between;padding:8px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.12s;border-bottom:1px solid var(--border)}
.stock-row:last-child{border-bottom:none}
.stock-row:hover{background:var(--bg3)}
.mono{font-family:'DM Mono',monospace}
.btn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:12px;color:var(--text);transition:all 0.15s;font-family:inherit;font-weight:500}
.btn:hover{background:var(--bg4)}.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-red{background:var(--red);border-color:var(--red);color:#fff}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}
input[type=number],input[type=text],input[type=search],select{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);
  padding:7px 10px;font-size:12px;color:var(--text);width:100%;font-family:inherit;transition:border-color 0.15s,background 0.2s}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.divider{height:1px;background:var(--border);margin:12px 0}
.phase-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:500}
.phase-bull{background:var(--red-dim);color:var(--red)}
.phase-bear{background:var(--blue-dim);color:var(--blue)}
.phase-neu{background:var(--bg4);color:var(--text2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;z-index:9999}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;max-width:500px;width:95%;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text)}
.tab-bar{display:flex;gap:6px;margin-bottom:12px}
.tab{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;transition:all 0.15s}
.tab.active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.save-slot{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;transition:background 0.2s}
.stone-row{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
.stone{width:20px;height:20px;border-radius:50%;display:inline-block;background:var(--text2);transition:background 0.2s}
.stone.taken{background:var(--bg4);border:1px solid var(--border)}
.move-btns{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.game-log{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:var(--text2);max-height:80px;overflow-y:auto;font-family:'DM Mono',monospace;margin-top:8px;transition:background 0.2s}
.game-log div{padding:2px 0;border-bottom:1px solid var(--border)}
.diff-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.diff-btn{padding:6px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all 0.15s;background:var(--bg3);color:var(--text)}
.diff-btn.easy{border-color:var(--green);color:var(--green)}
.diff-btn.easy.sel{background:var(--green-dim)}
.diff-btn.med{border-color:var(--gold);color:var(--gold)}
.diff-btn.med.sel{background:var(--gold-dim)}
.diff-btn.hard{border-color:var(--red);color:var(--red)}
.diff-btn.hard.sel{background:var(--red-dim)}
#chart-wrap{position:relative;width:100%;height:180px;margin-bottom:4px}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{padding-left:30px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);pointer-events:none}
.game-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:border-color 0.15s}
.game-card:hover{border-color:var(--accent)}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>주식</h1>
  <button class="nav-btn active" data-sec="profile" onclick="go('profile',this)">내 프로필</button>
  <button class="nav-btn" data-sec="work" onclick="go('work',this)">대출/일하기</button>
  <button class="nav-btn" data-sec="market" onclick="go('market',this)">주식 시장</button>
  <button class="nav-btn" data-sec="save" onclick="go('save',this)">저장하기</button>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙 다크</button>
</div>

<!-- 프로필 -->
<div id="sec-profile" class="section active">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:12px">
      <div>
        <div class="card-title">내 자산 현황</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div id="p-day" class="mono" style="font-size:13px;color:var(--text2)"></div>
          <div id="p-phase"></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="nextDay()">다음 날로 →</button>
    </div>
    <div class="grid3" style="margin-bottom:10px">
      <div class="metric"><div class="lbl">보유 현금</div><div class="val" id="p-cash"></div></div>
      <div class="metric"><div class="lbl">주식 평가액</div><div class="val" id="p-sv"></div></div>
      <div class="metric"><div class="lbl">대출 잔액</div><div class="val" id="p-loan"></div></div>
    </div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px">
      <div style="font-size:10px;color:var(--text3);margin-bottom:3px;font-family:'DM Mono',monospace">총 자산</div>
      <div id="p-total" style="font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">보유 주식</div>
    <div id="p-portfolio"></div>
  </div>
</div>

<!-- 대출/일하기 -->
<div id="sec-work" class="section">
  <div class="card">
    <div class="card-title">대출</div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="metric"><div class="lbl">대출 잔액</div><div class="val" id="w-loan"></div></div>
      <div class="metric"><div class="lbl">일별 이자</div><div class="val" id="w-int" style="font-size:13px;color:var(--red)"></div></div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:7px">이자 방식</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button id="btn-simple" class="btn" onclick="setLT('simple')">단리 연 15%</button>
      <button id="btn-compound" class="btn btn-primary" onclick="setLT('compound')">복리 연 10%</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input type="number" id="loan-amt" placeholder="대출 금액 (₩)">
      <button class="btn btn-primary" style="white-space:nowrap" onclick="takeLoan()">대출</button>
    </div>
    <div style="display:flex;gap:6px">
      <input type="number" id="repay-amt" placeholder="상환 금액 (₩)">
      <button class="btn" style="white-space:nowrap" onclick="repayLoan()">상환</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">일하기 — 보드게임 미니게임</div>
    <div style="color:var(--text2);font-size:12px;margin-bottom:14px;line-height:1.9">
      난이도를 선택하고 컴퓨터와 보드게임을 겨루세요!<br>
      <span style="color:var(--green);font-weight:600">쉬움 ₩500</span> &nbsp;·&nbsp;
      <span style="color:var(--gold);font-weight:600">보통 ₩1,000</span> &nbsp;·&nbsp;
      <span style="color:var(--red);font-weight:600">어려움 ₩3,000</span>
    </div>
    <div class="diff-bar">
      <button class="diff-btn easy" onclick="selDiff('easy',this)">쉬움 +₩500</button>
      <button class="diff-btn med sel" onclick="selDiff('med',this)">보통 +₩1,000</button>
      <button class="diff-btn hard" onclick="selDiff('hard',this)">어려움 +₩3,000</button>
    </div>
    <button class="btn btn-gold" onclick="openMG()">게임 선택</button>
  </div>
</div>

<!-- 주식 시장 -->
<div id="sec-market" class="section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="stock-search" placeholder="기업명, 섹터, 지역 검색..." oninput="renderAllStocks()">
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-all" onclick="switchTab('all')">전체 시장</button>
    <button class="tab" id="tab-my" onclick="switchTab('my')">내 주식</button>
  </div>
  <div id="mkt-all">
    <div class="card">
      <div class="card-title">전날 대비 상승률 순 &nbsp;·&nbsp; 수수료 0.3%</div>
      <div id="all-stocks"></div>
    </div>
  </div>
  <div id="mkt-my" style="display:none">
    <div class="card">
      <div class="card-title">보유 주식 매도</div>
      <div id="my-stocks"></div>
    </div>
  </div>
</div>

<!-- 저장 -->
<div id="sec-save" class="section">
  <div class="card">
    <div class="card-title">저장 슬롯</div>
    <div style="display:flex;flex-direction:column;gap:8px" id="save-slots"></div>
  </div>
  <div class="card" style="border-color:var(--red);margin-top:4px">
    <div class="card-title" style="color:var(--red)">위험 구역</div>
    <div style="color:var(--text2);font-size:12px;margin-bottom:12px">현재 게임을 초기 상태로 되돌립니다. 되돌릴 수 없습니다.</div>
    <button class="btn btn-red" onclick="doReset()">초기화</button>
  </div>
</div>
</div>

<!-- 주식 상세 모달 -->
<div class="modal-overlay" id="stock-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <h3 id="m-name"></h3>
        <div class="mono" style="font-size:11px;color:var(--text3)" id="m-sub"></div>
      </div>
      <button class="btn" onclick="closeModal('stock-modal')" style="padding:4px 10px">✕</button>
    </div>
    <div id="chart-wrap"><canvas id="mc"></canvas></div>
    <div class="grid2" style="margin:10px 0">
      <div class="metric"><div class="lbl">현재가</div><div class="val" id="m-price"></div></div>
      <div class="metric"><div class="lbl">전일 대비</div><div class="val" id="m-chg"></div></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="metric"><div class="lbl">보유 수량</div><div class="val" id="m-held"></div></div>
      <div class="metric"><div class="lbl">현재 국면</div><div id="m-phase" style="font-size:13px;font-weight:600;padding-top:4px"></div></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <input type="number" id="buy-q" placeholder="매수 수량" min="1" step="1" style="flex:1">
      <span id="buy-lbl" class="mono" style="font-size:11px;color:var(--text2);white-space:nowrap;min-width:82px;text-align:right"></span>
      <button class="btn btn-red" onclick="execBuy()">매수</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="number" id="sell-q" placeholder="매도 수량" min="1" step="1" style="flex:1">
      <span id="sell-lbl" class="mono" style="font-size:11px;color:var(--text2);white-space:nowrap;min-width:82px;text-align:right"></span>
      <button class="btn btn-blue" onclick="execSell()">매도</button>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:6px">수수료 0.3% 포함</div>
    <div id="m-msg" style="font-size:12px;margin-top:8px;min-height:16px;font-weight:500"></div>
  </div>
</div>

<!-- 미니게임 선택 모달 -->
<div class="modal-overlay" id="mg-select-modal">
  <div class="modal" style="max-width:520px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <h3>게임 선택</h3>
        <div id="mg-sel-sub" style="font-size:12px;color:var(--text2);margin-top:2px"></div>
      </div>
      <button class="btn" onclick="closeModal('mg-select-modal')" style="padding:4px 10px">✕</button>
    </div>
    <div id="mg-game-list" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>
</div>

<!-- 미니게임 플레이 모달 -->
<div class="modal-overlay" id="mg-modal">
  <div class="modal" style="max-width:540px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <h3 id="mg-title"></h3>
        <div id="mg-reward-label" style="font-size:11px;color:var(--text2);margin-top:2px"></div>
      </div>
      <button class="btn" onclick="closeModal('mg-modal')" style="padding:4px 10px">✕</button>
    </div>
    <div id="mg-desc" style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.8;background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;border:1px solid var(--border)"></div>
    <div id="mg-board"></div>
    <div id="mg-result" style="min-height:22px;font-size:14px;font-weight:700;margin:10px 0"></div>
    <div class="game-log" id="mg-log"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ═══ 테마 ═══ */
let isDark=true;
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('theme-btn').textContent=isDark?'🌙 다크':'☀️ 라이트';
  try{localStorage.setItem('sg_theme',isDark?'dark':'light');}catch(e){}
}
(function(){try{const t=localStorage.getItem('sg_theme');if(t==='light'){isDark=false;document.documentElement.setAttribute('data-theme','light');document.getElementById('theme-btn').textContent='☀️ 라이트';}}catch(e){}})();

/* ═══ 기업 데이터 ═══ */
const COMM=0.003;
const TPL=[
  // 한국 반도체/전자
  {id:'005930',name:'삼성전자',sector:'반도체',region:'🇰🇷',base:70000},
  {id:'000660',name:'SK하이닉스',sector:'반도체',region:'🇰🇷',base:130000},
  {id:'042700',name:'한미반도체',sector:'반도체',region:'🇰🇷',base:90000},
  {id:'009150',name:'삼성전기',sector:'전자부품',region:'🇰🇷',base:140000},
  {id:'032830',name:'삼성생명',sector:'보험',region:'🇰🇷',base:80000},
  // 한국 IT/게임/플랫폼
  {id:'035420',name:'NAVER',sector:'IT플랫폼',region:'🇰🇷',base:200000},
  {id:'035720',name:'카카오',sector:'IT플랫폼',region:'🇰🇷',base:50000},
  {id:'259960',name:'크래프톤',sector:'게임',region:'🇰🇷',base:270000},
  {id:'036570',name:'엔씨소프트',sector:'게임',region:'🇰🇷',base:180000},
  {id:'112040',name:'위메이드',sector:'게임',region:'🇰🇷',base:28000},
  {id:'263750',name:'펄어비스',sector:'게임',region:'🇰🇷',base:45000},
  // 한국 통신

/* ═══ 상태 ═══ */
function rPh(){const r=Math.random();return r<.33?'bull':r<.66?'bear':'neutral';}
function initState(){
  const stocks=TPL.map(s=>{
    const price=Math.round(s.base*(0.82+Math.random()*0.36)/getUnit(s.base,s.region))*getUnit(s.base,s.region);
    return{...s,price,prevPrice:price,history:[price],phase:rPh(),phaseDay:0};
  });
  return{day:1,cash:1000000,loan:0,loanType:'compound',loanSR:0.15,loanCR:0.10,portfolio:{},stocks,saves:[null,null,null]};
}
function getUnit(base,reg){
  if(reg==='🇰🇷') return base<5000?10:100;
  if(reg==='🇯🇵') return 100;
  return base<10?0.01:base<100?0.1:1;
}

let G=loadOrInit(),selStock=null,mChart=null,curDiff='med';
function loadOrInit(){try{const d=localStorage.getItem('sg4');if(d)return JSON.parse(d);}catch(e){}return initState();}
function sl(){try{localStorage.setItem('sg4',JSON.stringify(G));}catch(e){}}
const fmt=n=>{const v=Math.abs(Math.round(n));const s=n<0?'-':'';if(v>=100000000)return s+'₩'+(v/100000000).toFixed(1)+'억';if(v>=10000)return s+'₩'+(v/10000).toFixed(1)+'만';return s+'₩'+v.toLocaleString();};
const fmtFull=n=>'₩'+Math.round(n).toLocaleString();
const fmtP=p=>(p>=0?'+':'')+p.toFixed(2)+'%';

function getSV(){return Object.entries(G.portfolio).reduce((s,[id,q])=>{const st=G.stocks.find(x=>x.id===id);return s+(st?st.price*q:0);},0);}
function renderProfile(){
  const sv=getSV();
  document.getElementById('p-day').textContent=G.day+'일차';
  document.getElementById('p-cash').textContent=fmt(G.cash);
  document.getElementById('p-sv').textContent=fmt(sv);
  document.getElementById('p-loan').textContent=fmt(G.loan);
  document.getElementById('p-total').textContent=fmtFull(G.cash+sv-G.loan);
  const bull=G.stocks.filter(s=>s.phase==='bull').length,bear=G.stocks.filter(s=>s.phase==='bear').length;
  const ov=bull>bear?'bull':bear>bull?'bear':'neutral';
  const lm={'bull':'▲ 전체 상승장','bear':'▼ 전체 하락장','neutral':'— 중립장'};
  const cm={'bull':'phase-bull','bear':'phase-bear','neutral':'phase-neu'};
  document.getElementById('p-phase').innerHTML=`<span class="phase-pill ${cm[ov]}">${lm[ov]}</span>`;
  const entries=Object.entries(G.portfolio).filter(([,q])=>q>0);
  const pl=document.getElementById('p-portfolio');
  if(!entries.length){pl.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px 0">보유 주식 없음</div>';return;}
  pl.innerHTML=entries.map(([id,q])=>{
    const s=G.stocks.find(x=>x.id===id);if(!s)return'';
    const chg=(s.price-s.prevPrice)/s.prevPrice*100,c=chg>0?'up':chg<0?'down':'neu';
    const phC={'bull':'var(--red)','bear':'var(--blue)','neutral':'var(--text3)'}[s.phase];
    const phI={'bull':'▲','bear':'▼','neutral':'—'}[s.phase];
    return`<div class="stock-row"><div>
      <span style="font-weight:500" class="${c}">${s.name}</span>
      <span class="tag ${chg>0?'tag-up':chg<0?'tag-down':'tag-neu'}">${fmtP(chg)}</span>
      <span class="sector-tag">${s.sector}</span>
      <span style="font-size:10px;color:${phC};margin-left:3px">${phI}</span>
    </div>
    <div style="text-align:right"><div class="mono" style="font-weight:500">${q}주</div><div class="mono" style="font-size:11px;color:var(--text2)">${fmt(s.price*q)}</div></div></div>`;
  }).join('');
}

/* ═══ 다음 날 ═══ */
function nextDay(){
  G.day++;
  if(G.loan>0){const r=G.loanType==='compound'?G.loanCR:G.loanSR;G.loan=Math.round(G.loan*(1+r/365));}
  // 섹터별 phase 동조 처리
  const sectorLeader={};
  G.stocks.forEach(s=>{if(!sectorLeader[s.sector])sectorLeader[s.sector]=s.phase;});
  G.stocks.forEach(s=>{
    s.phaseDay++;
    if(s.phaseDay>=5&&Math.random()<0.18){
      if(Math.random()<0.7){
        // 70% 확률로 같은 섹터 리더 따라감
        s.phase=sectorLeader[s.sector];
      } else {
        s.phase=rPh();
      }
      // 새 phase로 바뀌면 섹터 리더 업데이트
      sectorLeader[s.sector]=s.phase;
      s.phaseDay=0;
    }
    const rng={'bull':[0.97,1.06],'bear':[0.94,1.03],'neutral':[0.96,1.04]};
    const [lo,hi]=rng[s.phase];
    const unit=getUnit(s.base||s.price,s.region);
    const raw=s.price*(lo+Math.random()*(hi-lo));
    s.prevPrice=s.price;
    s.price=Math.max(unit,Math.round(raw/unit)*unit);
    s.history.push(s.price);
  });
  sl();renderProfile();
  if(document.getElementById('sec-market').classList.contains('active'))renderMarket();
}

    const chg=(s.price-s.prevPrice)/s.prevPrice*100,c=chg>0?'up':chg<0?'down':'neu';

      <span style="font-weight:500" class="${c}">${s.region} ${s.name}</span>

}
function drawChart(s){
  if(mChart){mChart.destroy();mChart=null;}
  const ctx=document.getElementById('mc').getContext('2d');
  const hist=s.history.slice(-30);
  const col=s.price>=s.prevPrice?'#ff4d4d':'#4d9eff';
  mChart=new Chart(ctx,{type:'line',data:{labels:hist.map((_,i)=>(G.day-hist.length+1+i)+'일'),datasets:[{data:hist,borderColor:col,borderWidth:2,pointRadius:hist.length>15?0:3,pointBackgroundColor:col,fill:true,backgroundColor:col+'20',tension:0.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8e9ab8',font:{size:10},maxTicksLimit:6},grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{color:'#8e9ab8',font:{size:10},callback:v=>fmt(v)},grid:{color:'rgba(128,128,128,0.1)'}}}}});
}
function execBuy(){
  const s=G.stocks.find(x=>x.id===selStock);
  const q=parseInt(document.getElementById('buy-q').value)||0;
  if(q<1){setMsg('수량을 입력하세요','r');return;}
  const total=q*s.price*(1+COMM);
  if(total>G.cash){setMsg('현금이 부족합니다','r');return;}
  G.cash-=total;G.portfolio[s.id]=(G.portfolio[s.id]||0)+q;
  sl();setMsg(q+'주 매수 완료 ('+fmtFull(total)+')','g');
  document.getElementById('m-held').textContent=(G.portfolio[s.id]||0)+'주';
  renderProfile();renderAllStocks();renderMyStocks();
}
function execSell(){
  const s=G.stocks.find(x=>x.id===selStock);
  const q=parseInt(document.getElementById('sell-q').value)||0;
  if(q<1){setMsg('수량을 입력하세요','r');return;}
  const held=G.portfolio[s.id]||0;if(q>held){setMsg('보유 수량('+held+'주) 초과','r');return;}
  const total=q*s.price*(1-COMM);
  G.cash+=total;G.portfolio[s.id]=held-q;
  sl();setMsg(q+'주 매도 완료 ('+fmtFull(total)+')','b');
  document.getElementById('m-held').textContent=(G.portfolio[s.id]||0)+'주';
  renderProfile();renderAllStocks();renderMyStocks();
}

/* 현재 게임 상태 */
let mg={game:null,st:null,done:false,diff:'med'};

function openMG(){
  const dOrder={easy:0,med:1,hard:2};
  const avail=GAMES.filter(g=>dOrder[g.minDiff]<=dOrder[curDiff]);
  document.getElementById('mg-sel-sub').textContent=`${DNAMES[curDiff]} 난이도 · 승리 시 ${fmtFull(REWARDS[curDiff])} 획득`;
  document.getElementById('mg-game-list').innerHTML=avail.map(g=>`
    <div class="game-card" onclick="startGame('${g.id}')">
      <div style="font-weight:600;font-size:13px;margin-bottom:3px">${g.title}
        <span style="font-size:10px;color:var(--text3);font-weight:400;margin-left:6px">${{easy:'쉬움',med:'보통~',hard:'어려움+'}[g.minDiff]}</span>
      </div>
      <div style="font-size:11px;color:var(--text2)">${g.desc(curDiff).replace(/<[^>]+>/g,'').slice(0,70)}...</div>
    </div>`).join('');
  document.getElementById('mg-select-modal').classList.add('open');
}

function startGame(id){
  const g=GAMES.find(x=>x.id===id);
  mg={game:g,st:g.init(curDiff),done:false,diff:curDiff};
  closeModal('mg-select-modal');
  document.getElementById('mg-title').textContent=g.title;
  document.getElementById('mg-reward-label').textContent=`${DNAMES[curDiff]} · 승리 시 ${fmtFull(REWARDS[curDiff])} 획득`;
  document.getElementById('mg-desc').innerHTML=g.desc(curDiff);
  document.getElementById('mg-result').textContent='';
  document.getElementById('mg-log').innerHTML='';
  g.render(mg.st,document.getElementById('mg-board'));
  document.getElementById('mg-modal').classList.add('open');
}

/* ── nim 계열 공통 ── */
window.mgNim=function(n){
  const g=mg.game,st=mg.st;if(st.turn!=='A'||mg.done)return;
  addLog('당신(A): '+n+'개');
  const res=g.step(st,n,true);
  if(res){endMG(res==='win');return;}
  st.turn='B';g.render(st,document.getElementById('mg-board'));
  setTimeout(()=>{
    const m=g.ai(st);if(m===null){endMG(true);return;}
    addLog('컴퓨터(B): '+m+'개');
    const res2=g.step(st,m,false);
    if(res2){endMG(res2==='win');return;}
    st.turn='A';g.render(st,document.getElementById('mg-board'));
  },700);
};

/* ── 틱택토 ── */
window.mgTTT=function(i){
  const g=mg.game,st=mg.st;if(st.turn!=='A'||mg.done||st.board[i]!==0)return;
  st.board[i]=1;addLog('당신(A): '+(i+1)+'번');
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  if(wins.some(r=>r.every(j=>st.board[j]===1))){endMG(true);return;}
  if(st.board.every(v=>v!==0)){endMG(false);return;}
  st.turn='B';g.render(st,document.getElementById('mg-board'));
  setTimeout(()=>{
    const m=g.ai(st);if(m===null){endMG(true);return;}
    st.board[m]=-1;addLog('컴퓨터(B): '+(m+1)+'번');
    if(wins.some(r=>r.every(j=>st.board[j]===-1))){endMG(false);return;}
    if(st.board.every(v=>v!==0)){endMG(false);return;}
    st.turn='A';g.render(st,document.getElementById('mg-board'));
  },600);
};

/* ── 커넥트4 ── */
window.mgC4=function(c){
  const g=mg.game,st=mg.st;if(st.turn!=='A'||mg.done)return;
  const{board,cols,rows}=st;let r=-1;for(let row=0;row<rows;row++){if(board[row*cols+c]===0){r=row;break;}}if(r<0)return;
  board[r*cols+c]=1;addLog('당신(A): '+(c+1)+'열');
  function w4(b,p){for(let rr=0;rr<rows;rr++)for(let cc=0;cc<cols;cc++){if([[0,1],[1,0],[1,1],[1,-1]].some(([dr,dc])=>[0,1,2,3].every(k=>{const nr=rr+k*dr,nc=cc+k*dc;return nr>=0&&nr<rows&&nc>=0&&nc<cols&&b[nr*cols+nc]===p})))return true;}return false;}
  if(w4(board,1)){endMG(true);return;}if(board.every(v=>v!==0)){endMG(false);return;}
  st.turn='B';g.render(st,document.getElementById('mg-board'));
  setTimeout(()=>{
    const mc=g.ai(st);if(mc===null){endMG(true);return;}
    let mr=-1;for(let row=0;row<rows;row++){if(board[row*cols+mc]===0){mr=row;break;}}if(mr<0){endMG(true);return;}
    board[mr*cols+mc]=-1;addLog('컴퓨터(B): '+(mc+1)+'열');
    if(w4(board,-1)){endMG(false);return;}if(board.every(v=>v!==0)){endMG(false);return;}
    st.turn='A';g.render(st,document.getElementById('mg-board'));
  },700);
};

/* ── 촘프 ── */
window.mgChomp=function(r,c){
  const g=mg.game,st=mg.st;if(st.turn!=='A'||mg.done)return;
  if(r===0&&c===0){endMG(false);return;}
  for(let rr=r;rr<4;rr++)for(let cc=c;cc<5;cc++)st.g[rr][cc]=0;
  addLog(`당신(A): (${r+1}행,${c+1}열)`);
  let left=0;for(let rr=0;rr<4;rr++)for(let cc=0;cc<5;cc++)if(st.g[rr][cc])left++;
  if(left===1){endMG(false);return;}
  st.turn='B';g.render(st,document.getElementById('mg-board'));
  setTimeout(()=>{
    const[ar,ac]=g.ai(st);if(ar===0&&ac===0){endMG(true);return;}
    for(let rr=ar;rr<4;rr++)for(let cc=ac;cc<5;cc++)st.g[rr][cc]=0;
    addLog(`컴퓨터(B): (${ar+1}행,${ac+1}열)`);
    let left2=0;for(let rr=0;rr<4;rr++)for(let cc=0;cc<5;cc++)if(st.g[rr][cc])left2++;
    if(left2===1){endMG(true);return;}
    st.turn='A';g.render(st,document.getElementById('mg-board'));
  },700);
};

/* ── 돌 더미 나누기 ── */
window.mgSplit=function(){
  const g=mg.game,st=mg.st;if(st.turn!=='A'||mg.done)return;
  const pi=parseInt(document.getElementById('sp-pile').value);
  const a=parseInt(document.getElementById('sp-a').value);
  const b=parseInt(document.getElementById('sp-b').value);
  const pile=st.piles[pi];
  if(!a||!b||a+b!==pile||a===b){document.getElementById('mg-result').textContent='유효하지 않은 분할 (합='+pile+', 두 수 달라야 함)';document.getElementById('mg-result').style.color='var(--red)';return;}
  document.getElementById('mg-result').textContent='';
  st.piles.splice(pi,1,a,b);addLog(`당신(A): 더미${pi+1}(${pile}) → ${a}+${b}`);
  if(!st.piles.some(p=>p>=3)){endMG(true);return;}
  st.turn='B';g.render(st,document.getElementById('mg-board'));
  setTimeout(()=>{
    const mv=g.ai(st);if(!mv){endMG(true);return;}
    const[bi,ba,bb]=mv;const bp=st.piles[bi];st.piles.splice(bi,1,ba,bb);
    addLog(`컴퓨터(B): 더미${bi+1}(${bp}) → ${ba}+${bb}`);
    if(!st.piles.some(p=>p>=3)){endMG(false);return;}
    st.turn='A';g.render(st,document.getElementById('mg-board'));
  },700);
};

/* ── 바이너리 님 ── */
window.mgBNim=function(){
  const g=mg.game,st=mg.st;if(st.turn!=='A'||mg.done)return;
  const pi=parseInt(document.getElementById('bn-pile').value);
  const n=parseInt(document.getElementById('bn-n').value);
  if(!n||n<1||n>st.piles[pi]){document.getElementById('mg-result').textContent='유효하지 않은 수';document.getElementById('mg-result').style.color='var(--red)';return;}
  document.getElementById('mg-result').textContent='';
  st.piles[pi]-=n;addLog(`당신(A): 더미${['A','B','C'][pi]} −${n} → ${st.piles[pi]}`);
  if(st.piles.every(p=>p===0)){endMG(true);return;}
  st.turn='B';g.render(st,document.getElementById('mg-board'));
  setTimeout(()=>{
    const mv=g.ai(st);if(!mv){endMG(true);return;}
    const[bi,bn]=mv;st.piles[bi]-=bn;
    addLog(`컴퓨터(B): 더미${['A','B','C'][bi]} −${bn} → ${st.piles[bi]}`);
    if(st.piles.every(p=>p===0)){endMG(false);return;}
    st.turn='A';g.render(st,document.getElementById('mg-board'));
  },700);
};

/* ── 공통 종료 ── */
function endMG(won){
  mg.done=true;if(mg.st)mg.st.done=true;
  const el=document.getElementById('mg-result');
  const reward=REWARDS[mg.diff||'med'];
  if(won){el.textContent=`🎉 승리! ${fmtFull(reward)} 획득!`;el.style.color='var(--gold)';G.cash+=reward;sl();renderProfile();renderWork();}
  else{el.textContent='😞 패배... 다시 도전하세요.';el.style.color='var(--red)';}
  if(mg.game&&mg.st)mg.game.render(mg.st,document.getElementById('mg-board'));
}
function addLog(t){const el=document.getElementById('mg-log');const d=document.createElement('div');d.textContent=t;el.appendChild(d);el.scrollTop=el.scrollHeight;}

/* ═══ 초기 렌더 ═══ */
renderProfile();
</script>
